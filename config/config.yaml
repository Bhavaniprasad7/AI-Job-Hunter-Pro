environment: development

database_url: sqlite:///ai_job_hunter_pro.db

resume_paths:
  - resumes/

job_sources:
  - name: naukri_search
    plugin: naukri
    settings:
      query: "Azure Integration developer"
      location: "India"
      max_pages: 1
  - name: indeed_search
    plugin: indeed
    settings:
      query: "Azure developer"
      location: "India"
      max_pages: 1
  - name: linkedin_search
    plugin: linkedin
    settings:
      query: "Azure PaaS developer"
      location: "India"
      max_pages: 1
  - name: company_careers
    plugin: company_page
    settings:
      urls:
        - "https://careers.microsoft.com/us/en/search-results?keywords=azure"
      selectors:
        card: "div.job-listing"
        title: "h2"
        company: ".company"
        location: ".location"
        description: ".description"

filter:
  experience_min: 5
  skills_all: []
  skills_any:
    - "Azure Logic Apps"
    - "Azure Service Bus"
    - "Azure API Management"
    - "Azure Functions"
    - "Azure Key Vault"
    - "Azure Monitor"
  company: []
  location: []
  max_age_days: 30
  fortune_500_only: true

email:
  enabled: false
  sender: "no-reply@example.com"
  recipients:
    - "team@example.com"
  smtp_server: "smtp.example.com"
  smtp_port: 587
  username: ""
  password: ""
  use_tls: true
  daily_summary_subject: "AI Job Hunter Pro Daily Summary"

report:
  output_dir: reports
  excel_filename: job_matches.xlsx
  html_filename: job_matches.html
  json_filename: job_matches.json

openai_api_key: ""
openai_model: "gpt-3.5-turbo"
